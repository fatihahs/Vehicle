services:
  - type: web
    name: laravel-app
    env: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    buildCommand: ""
    startCommand: ""
    envVars:
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        value: <POSTGRES_HOST>
      - key: DB_PORT
        value: "5432"
      - key: DB_DATABASE
        value: <YOUR_DB_NAME>
      - key: DB_USERNAME
        value: <YOUR_DB_USER>
      - key: DB_PASSWORD
        value: <YOUR_DB_PASSWORD>
